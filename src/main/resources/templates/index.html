<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>BMI Calculator</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
	<body>
		<div class="container mt-5">
			<div class="row justify-content-center">
				<div class="col-md-5">
					<div class="card shadow p-4">
						<h3 class="text-center mb-4">Enter Details</h3>
						
						<form action="/calculate" method="post">
							
							<div class="mb-3">
						      <label class="form-label">Name</label>
								<input type="text" placeholder="Enter name" class="form-control" name="name" required>
							</div>
														
						<div class="mb-3">
						   <label class="form-label">Height</label>
							<input type="text" name="heigth" class="form-controle" required>
						</div>
														
						<div>
					    	<label class="form-label">Weight</label>
						    <input type="text" class="form-controle" name="weigth" required>
						</div>
						
						<div class="d-grid">
							<button type="submit" class="btn btn-primary">Check Bmi</button>
						</div>
							
						<div class="d-grid mt-1">
							<a href="/chat" class="btn btn-success">Go to AI Chat</a>
					    </div>		
						
						</form>
							
						
							
						</div>
					</div>
				</div>
				
			</div>
		</div>
	</body>
</html>

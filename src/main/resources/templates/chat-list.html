<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Chats</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        
        <h3 class="text-center text-primary mb-4">📜 Chat History</h3>

        <!-- Chat List -->
        <div class="list-group">

            <div th:each="id : ${chatIds}" 
                 class="list-group-item d-flex justify-content-between align-items-center">

                <!-- Chat Open Button -->
                <a th:href="@{'/loadChat/' + ${id}}" 
                   class="btn btn-outline-primary w-75 text-start">
                   
                   💬 Chat ID: <span th:text="${id}"></span>

                </a>

                
                <a th:href="@{'/deleteChat/' + ${id}}" 
                   class="btn btn-danger ms-2">
                   🗑️
                </a>

            </div>

        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(chatIds)}" class="text-center mt-4 text-muted">
            No chats available 😔
        </div>

        <!-- Back Button -->
        <div class="d-grid mt-4">
            <a href="/chat" class="btn btn-secondary">🔙 Back to Chat</a>
        </div>

    </div>

</div>

</body>
</html>

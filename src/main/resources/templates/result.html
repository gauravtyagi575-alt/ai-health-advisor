<!DOCTYPE html>
<html>
	<head>
		<title>BMI Result</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	</head>
	<body class="bg-light">
		<div class="container mt-5">
			<div class="row justify-content-center">
				<div class="col-md-5">
				<div class="card shadow-lg text-center p-4">
					<h2 class="mb-3 text-primary">Your BMI Result</h2>
					<h1 class="display-4 fw-bold text-success" th:text="${bmi}"></h1>
					
					<h3 th:text="'Category: '+${category}"></h3>
					<p th:if="${category == 'Normal'}" class="text-success">Healthy ✅</p>
					<p th:if="${category == 'OverWeight'}" class="text-warning">Warning ⚠️</p>
					<p th:if="${category == 'UnderWeight'}" class="text-danger">Critical ❌</p>
					
					<h3 class="mt-3 text-primary">Ai Advice:</h3>
					<p class="fs-6 text-dark" th:text="${aiAdvice}"></p>
					
					<div class="d-grid">
						<a href="/" class="btn btn-outline-primary">Back</a>
					</div>
				</div>
				</div>
			</div>
			
		</div>
	</body>
</html>
